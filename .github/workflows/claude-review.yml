name: AI Code Review

on:
  # Trigger after the Tests workflow completes on any PR.
  # workflow_run runs in the base repo context (has secrets) and its event type
  # is accepted by Anthropic's OIDC exchange (unlike pull_request_target).
  # See: https://github.com/anthropics/claude-code-action/issues/713
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

jobs:
  review:
    # Only run on PR events (not pushes to main), skip draft PRs, and only on success
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'completed' &&
      github.event.workflow_run.pull_requests[0].number > 0
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # SECURITY: Always checkout the BASE branch, never the PR head.
      # This workflow uses `gh pr diff` to read changes — it never executes PR code.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://Dev/CLAUDE_CODE_OAUTH_TOKEN/credential

      - name: AI Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          # Provide GitHub token explicitly to bypass OIDC token exchange,
          # which fails for non-pull_request events (anthropics/claude-code-action#713)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # track_progress not supported with workflow_run events
          prompt: |
            You are a code reviewer for the copilot-money-mcp project.

            REPO: ${{ github.repository }}
            PR: #${{ github.event.workflow_run.pull_requests[0].number }}

            Review this PR with focus on:

            1. **Code Quality** - Clean code, error handling, readability
            2. **Security** - Vulnerabilities, input validation, data privacy
            3. **Performance** - Bottlenecks, memory leaks, efficient data access
            4. **Testing** - Coverage, edge cases, test quality
            5. **TypeScript** - Proper typing, no `any` abuse, type safety
            6. **MCP Protocol** - Correct tool definitions, proper server implementation
            7. **Data Privacy** - No logging of sensitive financial data

            For each issue found:
            - Post an inline comment on the specific line
            - Explain the problem clearly
            - Propose a code snippet showing the fix

            Format your review comments like this:
            **[AI Review]**
            **Issue:** <description>
            **Proposed Fix:**
            ```typescript
            // suggested code
            ```
            **Reasoning:** <why this improves the code>

            Use `gh pr diff` to see changes, then use `gh pr comment` for inline feedback.
            Be constructive. Praise good patterns too.

            After reviewing, post a summary comment with your overall assessment.
            Use `gh pr comment` to post your summary.

          # SECURITY: Only allow read and comment commands - NO approve/review commands
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh pr comment*),Bash(gh pr diff*),Bash(gh pr view*),Read,Grep,Glob"
