name: AI Code Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  review:
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # SECURITY: Always checkout the BASE branch, never the PR head.
      # This workflow uses `gh pr diff` to read changes — it never executes PR code.
      # This is critical for fork PRs: pull_request_target has secret access,
      # so checking out untrusted PR code would be a security vulnerability.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://Dev/CLAUDE_CODE_OAUTH_TOKEN/credential

      - name: AI Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass GitHub token explicitly to bypass OIDC token exchange,
          # which rejects pull_request_target events.
          # See: https://github.com/anthropics/claude-code-action/issues/713
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review this PR for the copilot-money-mcp project (MCP server for personal finance data).

            Focus areas:
            1. Code Quality — Clean code, error handling, readability
            2. Security — Vulnerabilities, input validation, data privacy
            3. Performance — Bottlenecks, memory leaks, efficient data access
            4. Testing — Coverage, edge cases, test quality
            5. TypeScript — Proper typing, no any abuse, type safety
            6. MCP Protocol — Correct tool definitions, proper server implementation
            7. Data Privacy — No logging of sensitive financial data

            Be constructive. Praise good patterns too.

          # SECURITY: Allow read-only gh commands — block approve/merge
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh pr diff*),Bash(gh pr view*),Read,Grep,Glob"
            --disallowedTools "Bash(gh pr review --approve*),Bash(gh pr merge*),Bash(gh pr close*)"
