name: AI Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  review:
    # Skip draft PRs, forked PRs, and Dependabot PRs (secrets are unavailable)
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://Dev/CLAUDE_CODE_OAUTH_TOKEN/credential

      - name: AI Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass GitHub token explicitly to bypass OIDC token exchange,
          # which rejects pull_request_target events.
          # See: https://github.com/anthropics/claude-code-action/issues/713
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review this PR for the copilot-money-mcp project (MCP server for personal finance data).

            Focus areas:
            1. Code Quality — Clean code, error handling, readability
            2. Security — Vulnerabilities, input validation, data privacy
            3. Performance — Bottlenecks, memory leaks, efficient data access
            4. Testing — Coverage, edge cases, test quality
            5. TypeScript — Proper typing, no any abuse, type safety
            6. MCP Protocol — Correct tool definitions, proper server implementation
            7. Data Privacy — No logging of sensitive financial data

            Be constructive. Praise good patterns too.

          # SECURITY: Allow read-only gh commands — block approve/merge
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh pr diff*),Bash(gh pr view*),Read,Grep,Glob"
            --disallowedTools "Bash(gh pr review --approve*),Bash(gh pr merge*),Bash(gh pr close*)"

      # Auto-approve owner PRs after successful review so the 1-approval
      # requirement is satisfied without needing a second human reviewer.
      # Fork PRs are excluded by the job-level `if` condition above.
      - name: Auto-approve owner PRs
        if: github.event.pull_request.user.login == github.repository_owner
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Auto-approved: AI code review passed for repo owner PR.'
            });
