name: Audit PR Reviews

on:
  # Run after every PR merge
  pull_request:
    types: [closed]

  # Run manually from Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        default: 'false'
        type: boolean
      pr_number:
        description: 'Specific PR number to audit (optional)'
        required: false
        type: string

  # Run weekly on Sundays at midnight (catch-all)
  schedule:
    - cron: '0 0 * * 0'

jobs:
  audit:
    # Skip PRs that were closed without merging
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create audited label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "audited" \
            --description "PR has been reviewed in audit" \
            --color "0E8A16" 2>/dev/null || true

      - name: Create audit label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "audit" \
            --description "Issue from PR audit" \
            --color "D93F0B" 2>/dev/null || true

      - name: Create review-followup label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "review-followup" \
            --description "Follow-up from code review" \
            --color "FBCA04" 2>/dev/null || true

      - name: Run PR Review Audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$INPUT_PR_NUMBER" ]; then
            ARGS="$ARGS --pr $INPUT_PR_NUMBER"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            ARGS="$ARGS --pr $EVENT_PR_NUMBER"
          fi
          # $ARGS is intentionally unquoted — word-splitting is needed to expand
          # "--pr 123" into two separate arguments for the script
          bun run scripts/audit-pr-reviews.ts $ARGS
